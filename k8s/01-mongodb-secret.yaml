# Credentials for the "genuser" MongoDB user, and the full connection string
# the app expects in MONGODB_URL. NOTE: for a real production system these
# values should come from a secrets manager (e.g. AWS Secrets Manager /
# External Secrets Operator) rather than being committed to git in plain
# base64 - base64 is NOT encryption. This is acceptable for a course project.
#
# Values below (already base64-encoded):
#   MONGO_USER      -> genuser
#   MONGO_PASSWORD  -> password
#   MONGODB_URL     -> mongodb://genuser:password@mongodb/namegen
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-credentials
  namespace: namegen
type: Opaque
data:
  MONGO_USER: Z2VudXNlcg==
  MONGO_PASSWORD: cGFzc3dvcmQ=
  MONGODB_URL: bW9uZ29kYjovL2dlbnVzZXI6cGFzc3dvcmRAbW9uZ29kYi9uYW1lZ2Vu
