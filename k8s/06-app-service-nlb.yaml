# Exposes the app via an AWS Network Load Balancer (NLB).
# EKS Auto Mode runs the AWS Load Balancer Controller for you, so a plain
# LoadBalancer Service with these annotations is enough to provision an NLB.
apiVersion: v1
kind: Service
metadata:
  name: namegen-app-nlb
  namespace: namegen
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    app: namegen-app
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
